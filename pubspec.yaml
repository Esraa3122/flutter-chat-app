name: e_chat
description: "A new Flutter project."

version: 1.0.0+1

environment:
  sdk: '>=3.3.3 <4.0.0'

dependencies:
  animate_do: ^4.2.0
  bloc: ^8.1.4
  cached_network_image: ^3.4.1
  connectivity_plus: ^6.1.5
  cupertino_icons: ^1.0.8
  dartz: ^0.10.1
  day_night_themed_switcher: ^2.0.2
  dio: ^5.4.3+1
  easy_localization: ^3.0.7
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.2
  flutter_bloc: ^8.1.5
  flutter_contacts: ^2.1.0
  flutter_screenutil: ^5.9.1
  flutter_svg: ^2.0.10+1
  fluttertoast: ^8.2.12
  geocoding: ^4.0.0
  geolocator: ^14.0.2
  get_it: ^7.7.0
  go_router: ^14.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  image_picker: ^1.2.1
  internet_connection_checker: ^1.0.0+1
  intl: ^0.20.2
  lottie: ^3.3.1
  permission_handler: ^12.0.1
  pretty_dio_logger: ^1.4.0
  share_plus: ^12.0.0
  shared_preferences: ^2.5.3
  shimmer: ^3.0.0
  swipe_to: ^1.0.6
  url_launcher: ^6.3.0

dev_dependencies:
  build_runner: ^2.4.11
  flutter_gen_runner: null
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.6
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1

dependency_overrides:
  win32: ^5.5.4

flutter_gen:
  output: lib/gen/ # Optional (default: lib/gen/)
  line_length: 80 # Optional (default: 80)

  integrations:
    flutter_svg: true
    flare_flutter: true
    rive: true
    lottie: true

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/e_chat_app_logo..png"
  min_sdk_android: 21
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/e_chat_app_logo..png"
  remove_alpha_ios: true

flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/images/e_chat_app_logo..png"
  color_dark: "#212121"
  image_dark: "assets/images/e_chat_app_logo_dark.png"
  android_12:
    image: "assets/images/e_chat_app_logo..png"
    color: "#FFFFFF"
    image_dark: "assets/images/e_chat_app_logo_dark.png"
    color_dark: "#212121"
  android: true
  ios: true
  web: false
  fullscreen: false
  android_gravity: center
  ios_content_mode: center

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    # - assets/icons/
    - assets/languages/
    - assets/lottie/
    - assets/fonts/

  fonts:
    # Arabic Font
    - family: Cairo
      fonts:
        - asset: assets/fonts/arabic/cairo/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/arabic/cairo/Cairo-Medium.ttf
          weight: 500
        - asset: assets/fonts/arabic/cairo/Cairo-Regular.ttf
          weight: 400
    # English Font
    - family: SF-Pro
      fonts:
        - asset: assets/fonts/english/sef_pro/SF-Pro-Rounded-Bold.otf
          weight: 700
        - asset: assets/fonts/english/sef_pro/SF-Pro-Rounded-Medium.otf
          weight: 500
        - asset: assets/fonts/english/sef_pro/SF-Pro-Rounded-Regular.otf
          weight: 400
